services:
  postgres:
    image: postgres:17-alpine
    container_name: keeper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: keeper
      POSTGRES_USER: keeper
      POSTGRES_PASSWORD: keeper123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
